name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main  

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    # Source - https://stackoverflow.com/a/61699863
    - name: Shorten commit id
      shell: bash
      run: |
        echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"
  
    - name: Another step
      run: |
        echo "Branch: ${{ env.branch }}"
        echo "Sha: ${{ env.sha_short }}"

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login 2 Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: foxtrotalphaalpha/python-app:${{ env.COMMIT_ID }}
    outputs:
      commit_id: ${{ env.COMMIT_ID }}


  cd:
    needs: ci
    runs-on: self-hosted
    steps:

      #cloning the repo to get the values.yaml file
      - uses: actions/checkout@v3

      - name: Modify values file
        shell: bash
        run: |
          echo ${{needs.ci.outputs.commit_id}}
          pip install yq
          yq -Yi '.image.tag = "${{needs.ci.outputs.commit_id}}"' charts/python-app/values.yaml
      
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Update values.yaml with commit id ${{needs.ci.outputs.commit_id}}' 

      - name: Install Argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://github.com/argoproj/argo-cd/releases/download/v2.12.7/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd

      - name: Argocd APP Sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-app
